<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>rupu — Control Plane</title>
    <!-- No-flash theme: set data-theme synchronously before the app paints so
         dark-mode users never see a light flash on load. Mirrors ThemeProvider. -->
    <script>
      (function () {
        try {
          var pref = localStorage.getItem('rupu.cp.theme');
          var dark =
            pref === 'dark' ||
            ((pref === 'system' || !pref) &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.dataset.theme = dark ? 'dark' : 'light';
        } catch (e) {
          /* ignore */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
