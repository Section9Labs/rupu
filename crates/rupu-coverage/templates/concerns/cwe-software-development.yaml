    The product creates a temporary file in a directory whose permissions allow unintended actors to determine the file's existence or otherwise access that file.

    On some operating systems, the fact that the temporary file exists may be apparent to any user with sufficient privileges to access that directory. Since the file is visible, the application that is using the temporary file could be known. If one has access to list the processes on the system, the attacker has gained information about what the user is doing at that time. By correlating this with the applications the user is running, ...
