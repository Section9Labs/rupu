  name: CWE-927 — Use of Implicit Intent for Sensitive Communication
  description: |-
    The Android application uses an implicit intent for transmitting sensitive data to other applications.

    Since an implicit intent does not specify a particular application to receive the data, any application can process the intent by using an Intent Filter for that intent. This can allow untrusted applications to obtain sensitive data. There are two variations on the standard broadcast intent, ordered and sticky.Ordered broadcast intents are delivered to a series of registered receivers in order of priority as declared by the Receivers. A malicious receiver can give itself a high priority a...
