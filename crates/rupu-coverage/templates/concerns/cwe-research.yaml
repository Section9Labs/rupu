  name: CWE-921 — Storage of Sensitive Data in a Mechanism without Access Control
  description: |-
    The product stores sensitive information in a file system or device that does not have built-in access control.

    While many modern file systems or devices utilize some form of access control in order to restrict access to data, not all storage mechanisms have this capability. For example, memory cards, floppy disks, CDs, and USB devices are typically made accessible to any user within the system. This can become a problem when sensitive data is stored in these mechanisms in a multi-user environment, because anybody on the system can read or write this data.On Android devices, external stora...
