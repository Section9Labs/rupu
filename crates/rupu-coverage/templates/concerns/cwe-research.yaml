- id: cwe-research:cwe-1007-insufficient-visual-distinction-of-homoglyphs-presented-to-user
  name: CWE-1007 — Insufficient Visual Distinction of Homoglyphs Presented to User
  description: |-
    The product displays information or identifiers to a user, but the display mechanism does not make it easy for the user to distinguish between visually similar or identical glyphs (homoglyphs), which may cause the user to misinterpret a glyph and perform an unintended, insecure action.

    Some glyphs, pictures, or icons can be semantically distinct to a program, while appearing very similar or identical to a human user. These are referred to as homoglyphs. For example, the lowercase "l" (ell) and uppercase "I" (eye) have different character codes, but these characters can be displayed in exac...
  severity: medium
  applicable_globs:
