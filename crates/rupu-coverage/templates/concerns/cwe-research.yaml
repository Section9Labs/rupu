  name: CWE-668 — Exposure of Resource to Wrong Sphere
  description: |-
    The product exposes a resource to the wrong control sphere, providing unintended actors with inappropriate access to the resource.

    Resources such as files and directories may be inadvertently exposed through mechanisms such as insecure permissions, or when a program accidentally operates on the wrong object. For example, a program may intend that private files can only be provided to a specific user. This effectively defines a control sphere that is intended to prevent attackers from accessing these private files. If the file permissions are insecure, then parties other than the user will ...
