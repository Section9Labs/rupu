  name: CWE-666 — Operation on Resource in Wrong Phase of Lifetime
  description: |-
    The product performs an operation on a resource at the wrong phase of the resource's lifecycle, which can lead to unexpected behaviors.

    A resource's lifecycle includes several phases: initialization, use, and release. For each phase, it is important to follow the specifications outlined for how to operate on the resource and to ensure that the resource is in the expected phase. Otherwise, if a resource is in one phase but the operation is not valid for that phase (i.e., an incorrect phase of the resource's lifetime), then this can produce resultant weaknesses. For example, using a resource...
