- id: cwe-research:cwe-671-lack-of-administrator-control-over-security
  name: CWE-671 — Lack of Administrator Control over Security
  description: |-
    The product uses security features in a way that prevents the product's administrator from tailoring security settings to reflect the environment in which the product is being used. This introduces resultant weaknesses or prevents it from operating at a level of security that is desired by the administrator.

    If the product's administrator does not have the ability to manage security-related decisions at all times, then protecting the product from outside threats - including the product's developer - can become impossible. For example, a hard-coded account name and password cannot be change...
