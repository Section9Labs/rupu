  name: CWE-427 — Uncontrolled Search Path Element
  description: |-
    The product uses a fixed or controlled search path to find resources, but one or more locations in that path can be under the control of unintended actors.

    Although this weakness can occur with any type of resource, it is frequently introduced when a product uses a directory search path to find executables or code libraries, but the path contains a directory that can be modified by an attacker, such as "/tmp" or the current working directory.In Windows-based systems, when the LoadLibrary or LoadLibraryEx function is called with a DLL name that does not contain a fully qualified path, the f...
