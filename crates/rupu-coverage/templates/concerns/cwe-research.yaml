  description: |-
    The product creates a search index of private or sensitive documents, but it does not properly limit index access to actors who are authorized to see the original information.

    Web sites and other document repositories may apply an indexing routine against a group of private documents to facilitate search.  If the index's results are available to parties who do not have access to the documents being indexed, then attackers could obtain portions of the documents by conducting targeted searches and reading the results.  The risk is especially dangerous if search results include surrounding te...
