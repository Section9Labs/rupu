# Allowlist for GitHub secret scanning + push protection.
#
# `crates/rupu-providers/src/google_gemini.rs` carries the public CLI
# OAuth Client IDs and Client Secrets used by Gemini-CLI and
# Antigravity. These are documented "installed application"
# credentials — embedded in every CLI tool that uses Google OAuth
# (gcloud, Gemini-CLI, etc.) and not actually secret in the
# OAuth-secret sense. The PKCE + redirect-URI checks in the OAuth
# flow are the real authentication boundary.
#
# Scanning the file every push generates noise on legitimate phi-cell
# syncs without surfacing a real risk. Excluding it keeps scanner
# coverage on the rest of the workspace.
#
# If the lifted phi-providers crate ever stops carrying these
# identifiers (e.g., they get moved to env vars), drop this entry.

paths-ignore:
  - "crates/rupu-providers/src/google_gemini.rs"
