name: triage-and-fix
description: |
  End-to-end issue → fix → PR → comment-back flow.

  Run with:
    rupu issues run triage-and-fix github:owner/repo/issues/42

  When the run-target is an issue, the orchestrator pre-fetches the
  issue payload and binds it as `{{ issue.* }}` in every step.
  `notifyIssue: true` makes the CLI auto-post a comment on the
  issue at the end of the run with the run-id + outcome.

  This shows the FULL slice that the brainstorm sketched out:
  panel-review for triage, approval gate for human-in-the-loop,
  then a fixer agent that opens a PR via the SCM action protocol.

# Auto-comment on the targeted issue at the end of the run with the
# run-id + outcome (completed / failed / paused). The agent steps
# can also emit explicit issues.comment calls — this is just the
# default UX glue.
notifyIssue: true

steps:
  - id: classify
    panel:
      panelists: [security-reviewer, perf-reviewer, maintainability-reviewer]
      subject: |
        Issue #{{ issue.number }} on {{ issue.r.project }}
        Title: {{ issue.title }}
        Labels: {{ issue.labels | join(", ") }}

        {{ issue.body }}

  - id: approve_fix
    when: "{{ steps.classify.max_severity in ['high', 'critical'] }}"
    approval:
      required: true
      prompt: |
        Issue #{{ issue.number }} flagged {{ steps.classify.max_severity }}.

        Findings:
        {% for f in steps.classify.findings %}
        - [{{ f.severity }}] {{ f.title }} (from {{ f.source }})
        {% endfor %}

        Auto-fix?

  - id: investigate
    agent: investigator
    when: "{{ not steps.approve_fix.skipped }}"
    actions: [bash, read_file, grep, glob]
    prompt: |
      Reproduce and locate the root cause for issue #{{ issue.number }}.
      Findings to address:
      {% for f in steps.classify.findings %}
      - [{{ f.severity }}] {{ f.title }}: {{ f.body }}
      {% endfor %}

  - id: propose_fix
    agent: developer
    when: "{{ not steps.approve_fix.skipped }}"
    actions: [bash, read_file, write_file, edit_file]
    prompt: |
      Implement the fix based on:
      {{ steps.investigate.output }}

  - id: open_pr
    agent: scm-pr-author
    when: "{{ not steps.approve_fix.skipped }}"
    actions: [scm.prs.create, issues.comment]
    prompt: |
      Open a draft PR for issue #{{ issue.number }} with the changes
      from the propose_fix step. Title the PR with the issue number.
      After the PR is open, post a comment on issue #{{ issue.number }}
      linking the PR.
