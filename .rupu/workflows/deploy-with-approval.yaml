name: deploy-with-approval
description: |
  Demonstrates the approval gate. The pipeline prepares a release
  artifact, then pauses for operator approval before the deploy
  step actually runs. Resume with:

    rupu workflow approve <run-id>

  ...or abort with:

    rupu workflow reject <run-id> --reason "smoke test failed"

inputs:
  tag:
    type: string
    required: true

steps:
  - id: prepare
    agent: code-reviewer
    actions: []
    prompt: |
      Prepare release notes for tag {{ inputs.tag }}.

  - id: deploy
    agent: deployer
    actions: []
    approval:
      required: true
      prompt: |
        About to deploy {{ inputs.tag }} to production.

        Release notes:
        {{ steps.prepare.output }}

        Approve?
    prompt: |
      Deploy {{ inputs.tag }}. Reference notes:
      {{ steps.prepare.output }}

  - id: announce
    agent: writer
    actions: []
    prompt: |
      Announce the deploy of {{ inputs.tag }}.

      Deploy log:
      {{ steps.deploy.output }}
