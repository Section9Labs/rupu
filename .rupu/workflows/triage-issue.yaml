name: triage-issue
description: |
  Read an issue, classify severity, and print a structured triage report.
  Run with:
    rupu workflow run triage-issue --target github:owner/repo/issues/42

  When the run-target is an issue, the orchestrator pre-fetches the
  issue payload (title, body, labels, author, state) and binds it as
  `{{ issue.* }}` in every step's prompt + `when:` expression. The
  textual ref is also persisted on the run record so
    rupu workflow runs --issue github:owner/repo/issues/42
  filters back to every run that targeted that issue.

steps:
  - id: read
    agent: investigator
    actions: []
    prompt: |
      Issue #{{ issue.number }} on {{ issue.r.project }} (state: {{ issue.state }})
      Author: {{ issue.author }}
      Labels: {{ issue.labels | join(", ") }}

      Title: {{ issue.title }}

      Body:
      {{ issue.body }}

      Read the body and identify (in 3 bullets):
        1. What's broken
        2. Where to look first
        3. Severity (low / medium / high / critical)

  - id: bug_path
    agent: investigator
    actions: []
    when: "{{ 'bug' in issue.labels }}"
    prompt: |
      The issue is labeled `bug`. Based on the analysis below,
      reproduce the failure and propose a minimal fix:

      {{ steps.read.output }}

  - id: feature_path
    agent: investigator
    actions: []
    when: "{{ 'enhancement' in issue.labels or 'feature' in issue.labels }}"
    prompt: |
      The issue is labeled feature/enhancement. Sketch the design
      based on:

      {{ steps.read.output }}
